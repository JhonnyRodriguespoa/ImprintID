version: '3.9'

services:
  # ============================================================
  # PostgreSQL Database
  # ============================================================
  postgres:
    image: postgres:15-alpine
    container_name: imprintid-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: imprintid
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=en_US.UTF-8"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - imprintid-network

  # ============================================================
  # Redis Cache
  # ============================================================
  redis:
    image: redis:7-alpine
    container_name: imprintid-redis
    command: redis-server --appendonly yes --requirepass redis123
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - imprintid-network

  # ============================================================
  # IPFS Node
  # ============================================================
  ipfs:
    image: ipfs/kubo:latest
    container_name: imprintid-ipfs
    ports:
      - "4001:4001"
      - "4001:4001/udp"
      - "5001:5001"
      - "8080:8080"
    volumes:
      - ipfs_data:/data/ipfs
    environment:
      IPFS_PROFILE: server
    networks:
      - imprintid-network

  # ============================================================
  # Backend API Service
  # ============================================================
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: imprintid-backend
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: development
      PORT: 3000
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/imprintid
      REDIS_URL: redis://:redis123@redis:6379
      JWT_SECRET: ${JWT_SECRET:-your-jwt-secret-key-change-in-production}
      SOLANA_NETWORK: devnet
      SOLANA_RPC_URL: https://api.devnet.solana.com
    ports:
      - "3000:3000"
    volumes:
      - ./packages/backend/src:/app/src
      - /app/node_modules
    networks:
      - imprintid-network
    command: npm run dev

  # ============================================================
  # Frontend Application
  # ============================================================
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: imprintid-frontend
    environment:
      REACT_APP_API_URL: http://localhost:3000
      REACT_APP_SOLANA_NETWORK: devnet
      REACT_APP_SOLANA_RPC_ENDPOINT: https://api.devnet.solana.com
    ports:
      - "3001:3001"
    volumes:
      - ./packages/frontend/src:/app/src
      - /app/node_modules
    networks:
      - imprintid-network
    command: npm start

  # ============================================================
  # Nginx Reverse Proxy
  # ============================================================
  nginx:
    image: nginx:alpine
    container_name: imprintid-nginx
    depends_on:
      - backend
      - frontend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    networks:
      - imprintid-network

  # ============================================================
  # PgAdmin (Database Management UI)
  # ============================================================
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: imprintid-pgadmin
    depends_on:
      - postgres
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@imprintid.io
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    networks:
      - imprintid-network

  # ============================================================
  # Redis Commander (Redis UI)
  # ============================================================
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: imprintid-redis-commander
    depends_on:
      - redis
    environment:
      - REDIS_HOSTS=local:redis:6379:0:redis123
    ports:
      - "8081:8081"
    networks:
      - imprintid-network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  ipfs_data:
    driver: local
  pgadmin_data:
    driver: local

networks:
  imprintid-network:
    driver: bridge
